# Publishes the static study app to GitHub Pages whenever the sharing branch is pushed.
name: Deploy Study App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf _site
          mkdir _site
          cp index.html .nojekyll _site/
          cp -R src data vendor _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static app
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
