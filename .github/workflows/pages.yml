# Publishes the static study app to GitHub Pages whenever the sharing branch is pushed.
name: Deploy Study App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf _site
          mkdir _site
          cp index.html .nojekyll _site/
          cp -R src data vendor _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true
          enable_jekyll: false

      - name: Enable Pages from gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          status="$(
            curl -sS -o /tmp/pages.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages"
          )"
          if [ "${status}" = "404" ]; then
            curl -sS -f -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          elif [ "${status}" != "200" ]; then
            cat /tmp/pages.json
            exit 1
          fi
